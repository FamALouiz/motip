
repos:
  - repo: local
    hooks:
      - id: mypy
        name: Run mypy
        entry: uv run mypy src test
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-check
        name: Run ruff check
        entry: uv run ruff check src test
        language: system
        pass_filenames: false
        always_run: true